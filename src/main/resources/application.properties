spring.application.name=customer-service

server.port=2222

# ---------- Default Data Source (MySQL for Student) ----------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/home_loan_Customer
spring.datasource.username=root
spring.datasource.password=root


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#----------Logging------------------------
logging.level.root=info
logging.level.com.example.customer.rest=info
logging.level.com.example.customer.serviceimpl=debug
#----------Multipart Properties------------------

# Enable multipart uploads
spring.servlet.multipart.enabled=true
# Threshold after which files are written to disk.
spring.servlet.multipart.file-size-threshold=20MB
# Max file size.
spring.servlet.multipart.max-file-size=100MB
# Max Request Size
spring.servlet.multipart.max-request-size=100MB